{{- if .Values.helloWorld.enabled }}
# Temporary test job - cycles through curl requests to verify proxy chain
apiVersion: batch/v1
kind: Job
metadata:
  name: proxy-chain-test
  namespace: {{ include "quarantine-wrapper.appNamespace" . }}
  labels:
    {{- include "quarantine-wrapper.appLabels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 300
  template:
    spec:
      restartPolicy: Never
      initContainers:
        {{- include "quarantine-wrapper.caTrustInitContainer" . | nindent 8 }}
      containers:
        - name: curl-test
          image: python:3.12-slim
          command: ["python3", "-u", "-c"]
          args:
            - |
              import urllib.request, time, os, ssl
              ca = os.environ.get('SSL_CERT_FILE', '')
              ctx = ssl.create_default_context(cafile=ca) if ca else ssl.create_default_context()
              proxy = os.environ.get('https_proxy', '')
              print(f'Proxy: {proxy}')
              print(f'CA: {ca}')
              handler = urllib.request.ProxyHandler({'https': proxy, 'http': os.environ.get('http_proxy','')})
              opener = urllib.request.build_opener(handler, urllib.request.HTTPSHandler(context=ctx))
              for i in range(1, 11):
                  try:
                      r = opener.open('https://www.google.com', timeout=10)
                      print(f'Request {i}: HTTP {r.status}')
                  except Exception as e:
                      print(f'Request {i}: ERROR {e}')
                  time.sleep(3)
          env:
            {{- include "quarantine-wrapper.proxyEnv" . | nindent 12 }}
          volumeMounts:
            {{- include "quarantine-wrapper.caTrustVolumeMounts" . | nindent 12 }}
          resources:
            requests:
              memory: "32Mi"
              cpu: "10m"
            limits:
              memory: "128Mi"
              cpu: "100m"
      volumes:
        {{- include "quarantine-wrapper.caTrustVolumes" . | nindent 8 }}
{{- end }}
