{{- if .Values.openclaw.enabled }}
# ============================================================================
# OpenClaw AI-Agent (im App-Namespace)
# Laeuft isoliert in der Quarantine-Umgebung mit Proxy-Zugang
# ============================================================================

# --- PVC fuer OpenClaw State ---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: openclaw-data
  namespace: {{ include "quarantine-wrapper.appNamespace" . }}
  labels:
    {{- include "quarantine-wrapper.appLabels" . | nindent 4 }}
    app: openclaw
    recurring-job-group.longhorn.io/default: enabled
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: {{ .Values.openclaw.storageClass }}
  resources:
    requests:
      storage: {{ .Values.openclaw.storageSize }}
---
# --- ConfigMap: openclaw.json ---
apiVersion: v1
kind: ConfigMap
metadata:
  name: openclaw-config
  namespace: {{ include "quarantine-wrapper.appNamespace" . }}
  labels:
    {{- include "quarantine-wrapper.appLabels" . | nindent 4 }}
    app: openclaw
data:
  openclaw.json: |
    {
      "gateway": {
        "port": {{ .Values.openclaw.gatewayPort }},
        "bind": "lan",
        "mode": "local",
        "controlUi": {
          "allowedOrigins": [
            "http://localhost:{{ .Values.openclaw.gatewayPort }}",
            "http://127.0.0.1:{{ .Values.openclaw.gatewayPort }}",
            "https://{{ include "quarantine-wrapper.openclawHostname" . }}"
          ]
        }
      },
      "models": {
        "mode": "merge",
        "providers": {
          {{- if .Values.openclaw.gemini.enabled }}
          "gemini": {
            "baseUrl": "https://generativelanguage.googleapis.com/v1beta/openai/",
            "apiKey": "${GEMINI_API_KEY}",
            "api": "openai-completions",
            "models": [
              {
                "id": "gemini-2.5-flash",
                "name": "Gemini 2.5 Flash",
                "reasoning": false,
                "input": ["text"],
                "cost": { "input": 0, "output": 0 },
                "contextWindow": 1000000,
                "maxTokens": 65536
              }
            ]
          }
          {{- end }}
        }
      },
      "agents": {
        "defaults": {
          "model": {
            "primary": {{ .Values.openclaw.model | quote }}
          }
        }
      }
    }
---
# --- Deployment ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: openclaw
  namespace: {{ include "quarantine-wrapper.appNamespace" . }}
  labels:
    {{- include "quarantine-wrapper.appLabels" . | nindent 4 }}
    app: openclaw
spec:
  replicas: 1
  selector:
    matchLabels:
      app: openclaw
  template:
    metadata:
      labels:
        app: openclaw
        app.kubernetes.io/part-of: {{ .Values.appName }}-quarantine
        app.kubernetes.io/component: openclaw
      annotations:
        checksum/config: {{ printf "%s-%s-%s" .Values.openclaw.model .Values.openclaw.gatewayPort (include "quarantine-wrapper.openclawHostname" .) | sha256sum | trunc 16 }}
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      {{- if and .Values.mitmproxy.enabled .Values.ca.enabled }}
      initContainers:
        {{- include "quarantine-wrapper.caTrustInitContainer" . | nindent 8 }}
      {{- end }}
      containers:
        - name: openclaw
          image: {{ .Values.openclaw.image.repository }}:{{ .Values.openclaw.image.tag }}
          command: ["node", "openclaw.mjs", "gateway", "--allow-unconfigured"]
          ports:
            - containerPort: {{ .Values.openclaw.gatewayPort }}
              name: gateway
          env:
            {{- if .Values.openclaw.gemini.enabled }}
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.openclaw.gemini.secretName }}
                  key: api-key
            {{- end }}
            - name: OPENCLAW_STATE_DIR
              value: "/home/node/.openclaw"
            - name: OPENCLAW_CONFIG_PATH
              value: "/home/node/.openclaw/openclaw.json"
            - name: NODE_ENV
              value: "production"
            {{- if and .Values.mitmproxy.enabled .Values.ca.enabled }}
            {{- include "quarantine-wrapper.proxyEnv" . | nindent 12 }}
            {{- end }}
          volumeMounts:
            - name: openclaw-data
              mountPath: /home/node/.openclaw
            - name: openclaw-config
              mountPath: /home/node/.openclaw/openclaw.json
              subPath: openclaw.json
            {{- if and .Values.mitmproxy.enabled .Values.ca.enabled }}
            {{- include "quarantine-wrapper.caTrustVolumeMounts" . | nindent 12 }}
            {{- end }}
          resources:
            {{- toYaml .Values.openclaw.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.openclaw.gatewayPort }}
            initialDelaySeconds: 30
            periodSeconds: 60
            timeoutSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: {{ .Values.openclaw.gatewayPort }}
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 10
      volumes:
        - name: openclaw-data
          persistentVolumeClaim:
            claimName: openclaw-data
        - name: openclaw-config
          configMap:
            name: openclaw-config
        {{- if and .Values.mitmproxy.enabled .Values.ca.enabled }}
        {{- include "quarantine-wrapper.caTrustVolumes" . | nindent 8 }}
        {{- end }}
---
# --- Service ---
apiVersion: v1
kind: Service
metadata:
  name: openclaw
  namespace: {{ include "quarantine-wrapper.appNamespace" . }}
  labels:
    {{- include "quarantine-wrapper.appLabels" . | nindent 4 }}
    app: openclaw
spec:
  selector:
    app: openclaw
  ports:
    - port: {{ .Values.openclaw.gatewayPort }}
      targetPort: {{ .Values.openclaw.gatewayPort }}
      name: gateway
{{- end }}
