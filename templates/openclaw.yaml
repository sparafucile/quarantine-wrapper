{{- if .Values.openclaw.enabled }}
# ============================================================================
# OpenClaw AI-Agent (im App-Namespace)
# Laeuft isoliert in der Quarantine-Umgebung mit Proxy-Zugang
# ============================================================================

# --- PVC fuer OpenClaw State ---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: openclaw-data
  namespace: {{ include "quarantine-wrapper.appNamespace" . }}
  labels:
    {{- include "quarantine-wrapper.appLabels" . | nindent 4 }}
    app: openclaw
    recurring-job-group.longhorn.io/default: enabled
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: {{ .Values.openclaw.storageClass }}
  resources:
    requests:
      storage: {{ .Values.openclaw.storageSize }}
---
# --- ConfigMap: openclaw.json ---
apiVersion: v1
kind: ConfigMap
metadata:
  name: openclaw-config
  namespace: {{ include "quarantine-wrapper.appNamespace" . }}
  labels:
    {{- include "quarantine-wrapper.appLabels" . | nindent 4 }}
    app: openclaw
data:
  openclaw.json: |
    {
      "gateway": {
        "port": {{ .Values.openclaw.gatewayPort }},
        "bind": "lan",
        "mode": "local",
        "controlUi": {
          "allowedOrigins": [
            "http://localhost:{{ .Values.openclaw.gatewayPort }}",
            "http://127.0.0.1:{{ .Values.openclaw.gatewayPort }}",
            "https://{{ include "quarantine-wrapper.openclawHostname" . }}"
          ]
        }
      },
      "models": {
        "mode": "merge",
        "providers": {
          {{- if .Values.openclaw.gemini.enabled }}
          "gemini": {
            "baseUrl": "https://generativelanguage.googleapis.com/v1beta/openai/",
            "apiKey": "${GEMINI_API_KEY}",
            "api": "openai-completions",
            "models": [
              {
                "id": "gemini-2.5-flash",
                "name": "Gemini 2.5 Flash",
                "reasoning": false,
                "input": ["text"],
                "cost": { "input": 0, "output": 0 },
                "contextWindow": 1000000,
                "maxTokens": 65536
              }
            ]
          }
          {{- end }}
        }
      },
      "agents": {
        "defaults": {
          "model": {
            "primary": {{ .Values.openclaw.model | quote }}
          }
        }
      }
    }
  merge-config.py: |
    #!/usr/bin/env python3
    """Smart Merge: GitOps-kontrollierte Keys ueberschreiben,
    Runtime-Keys (auth, channels, devices, meta) beibehalten."""
    import json, sys, os, shutil

    GITOPS_SRC = "/config-source/openclaw.json"
    RUNTIME_CFG = "/home/node/.openclaw/openclaw.json"

    # Keys die GitOps kontrolliert (werden IMMER aus ConfigMap ueberschrieben)
    GITOPS_KEYS = ["models", "gateway.port", "gateway.bind", "gateway.mode",
                   "gateway.controlUi", "agents.defaults.model"]

    def deep_set(d, path, value):
        """Setzt einen verschachtelten Key: 'gateway.port' -> d['gateway']['port']"""
        keys = path.split(".")
        for k in keys[:-1]:
            d = d.setdefault(k, {})
        d[keys[-1]] = value

    def deep_get(d, path, default=None):
        """Liest einen verschachtelten Key."""
        keys = path.split(".")
        for k in keys:
            if isinstance(d, dict) and k in d:
                d = d[k]
            else:
                return default
        return d

    if not os.path.exists(RUNTIME_CFG):
        # Erstinstallation: volle Kopie
        shutil.copy2(GITOPS_SRC, RUNTIME_CFG)
        os.chown(RUNTIME_CFG, 1000, 1000)
        print("INIT: Erste Installation — volle Kopie aus ConfigMap")
        sys.exit(0)

    # Lade beide Configs
    with open(GITOPS_SRC) as f:
        gitops = json.load(f)
    with open(RUNTIME_CFG) as f:
        runtime = json.load(f)

    # Backup
    shutil.copy2(RUNTIME_CFG, RUNTIME_CFG + ".pre-merge")

    # Merge: nur GitOps-Keys ueberschreiben
    changes = []
    for key_path in GITOPS_KEYS:
        new_val = deep_get(gitops, key_path)
        old_val = deep_get(runtime, key_path)
        if new_val is not None:
            if old_val != new_val:
                changes.append(key_path)
            deep_set(runtime, key_path, new_val)

    # Zurueckschreiben
    with open(RUNTIME_CFG, "w") as f:
        json.dump(runtime, f, indent=2)
    os.chown(RUNTIME_CFG, 1000, 1000)

    if changes:
        print(f"MERGE: GitOps-Keys aktualisiert: {', '.join(changes)}")
    else:
        print("MERGE: Keine GitOps-Aenderungen — Runtime-Config beibehalten")

    # Zeige erhaltene Runtime-Keys
    preserved = []
    for key in ["gateway.auth", "channels", "devices", "meta", "commands"]:
        if deep_get(runtime, key) is not None:
            preserved.append(key)
    if preserved:
        print(f"PRESERVE: Runtime-Keys erhalten: {', '.join(preserved)}")
---
# --- Deployment ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: openclaw
  namespace: {{ include "quarantine-wrapper.appNamespace" . }}
  labels:
    {{- include "quarantine-wrapper.appLabels" . | nindent 4 }}
    app: openclaw
spec:
  replicas: 1
  selector:
    matchLabels:
      app: openclaw
  template:
    metadata:
      labels:
        app: openclaw
        app.kubernetes.io/part-of: {{ .Values.appName }}-quarantine
        app.kubernetes.io/component: openclaw
      annotations:
        checksum/config: {{ printf "%s-%s-%s" .Values.openclaw.model .Values.openclaw.gatewayPort (include "quarantine-wrapper.openclawHostname" .) | sha256sum | trunc 16 }}
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      initContainers:
        # 1) Smart-Merge: GitOps-Keys ueberschreiben, Runtime-Keys (auth, channels, meta) beibehalten
        - name: merge-config
          image: python:3.12-slim
          command: ["python3", "/config-source/merge-config.py"]
          volumeMounts:
            - name: openclaw-data
              mountPath: /home/node/.openclaw
            - name: openclaw-config
              mountPath: /config-source
              readOnly: true
        # 2) CA-Trust fuer mitmproxy TLS-Interception
        {{- if and .Values.mitmproxy.enabled .Values.ca.enabled }}
        {{- include "quarantine-wrapper.caTrustInitContainer" . | nindent 8 }}
        {{- end }}
        # 3) CLI-Tools: busybox-Applets + nano aus Alpine Packages
        #    nano ist nicht in busybox enthalten, deshalb apk add via Proxy
        - name: install-tools
          image: {{ printf "%s:%s" .Values.ca.initImage.repository .Values.ca.initImage.tag }}
          command: ["/bin/sh", "-c"]
          args:
            - |
              # Busybox-Tools (vi, less, grep, etc.)
              cp /bin/busybox /tools/busybox
              for cmd in vi less grep sed awk wget cat head tail wc sort uniq tr; do
                ln -sf busybox /tools/$cmd
              done
              echo "Busybox tools installed"
              # nano via apk (braucht Proxy + CA-Trust fuer dl-cdn.alpinelinux.org)
              {{- if and .Values.mitmproxy.enabled .Values.ca.enabled }}
              if [ -f /shared-certs/ca-certificates.crt ]; then
                cp /shared-certs/ca-certificates.crt /etc/ssl/certs/ca-certificates.crt
              fi
              {{- end }}
              apk add --no-cache nano 2>/dev/null && cp /usr/bin/nano /tools/nano && echo "nano installed" || echo "WARN: nano install failed (check Squid whitelist for dl-cdn.alpinelinux.org)"
          {{- if and .Values.mitmproxy.enabled .Values.ca.enabled }}
          env:
            {{- include "quarantine-wrapper.proxyEnv" . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: cli-tools
              mountPath: /tools
            {{- if and .Values.mitmproxy.enabled .Values.ca.enabled }}
            - name: shared-certs
              mountPath: /shared-certs
              readOnly: true
            {{- end }}
      containers:
        - name: openclaw
          image: {{ .Values.openclaw.image.repository }}:{{ .Values.openclaw.image.tag }}
          command: ["node", "openclaw.mjs", "gateway", "--allow-unconfigured"]
          ports:
            - containerPort: {{ .Values.openclaw.gatewayPort }}
              name: gateway
          env:
            {{- if .Values.openclaw.gemini.enabled }}
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.openclaw.gemini.secretName }}
                  key: api-key
            {{- end }}
            - name: OPENCLAW_STATE_DIR
              value: "/home/node/.openclaw"
            - name: OPENCLAW_CONFIG_PATH
              value: "/home/node/.openclaw/openclaw.json"
            - name: NODE_ENV
              value: "production"
            # Erweitere PATH um /usr/local/tools fuer nano/vi
            - name: PATH
              value: "/usr/local/tools:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
            {{- if and .Values.mitmproxy.enabled .Values.ca.enabled }}
            {{- include "quarantine-wrapper.proxyEnv" . | nindent 12 }}
            {{- end }}
          volumeMounts:
            - name: openclaw-data
              mountPath: /home/node/.openclaw
            - name: cli-tools
              mountPath: /usr/local/tools
              readOnly: true
            {{- if and .Values.mitmproxy.enabled .Values.ca.enabled }}
            {{- include "quarantine-wrapper.caTrustVolumeMounts" . | nindent 12 }}
            {{- end }}
          resources:
            {{- toYaml .Values.openclaw.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.openclaw.gatewayPort }}
            initialDelaySeconds: 30
            periodSeconds: 60
            timeoutSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: {{ .Values.openclaw.gatewayPort }}
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 10
      volumes:
        - name: openclaw-data
          persistentVolumeClaim:
            claimName: openclaw-data
        - name: openclaw-config
          configMap:
            name: openclaw-config
        - name: cli-tools
          emptyDir: {}
        {{- if and .Values.mitmproxy.enabled .Values.ca.enabled }}
        {{- include "quarantine-wrapper.caTrustVolumes" . | nindent 8 }}
        {{- end }}
---
# --- Service ---
apiVersion: v1
kind: Service
metadata:
  name: openclaw
  namespace: {{ include "quarantine-wrapper.appNamespace" . }}
  labels:
    {{- include "quarantine-wrapper.appLabels" . | nindent 4 }}
    app: openclaw
spec:
  selector:
    app: openclaw
  ports:
    - port: {{ .Values.openclaw.gatewayPort }}
      targetPort: {{ .Values.openclaw.gatewayPort }}
      name: gateway
{{- end }}
