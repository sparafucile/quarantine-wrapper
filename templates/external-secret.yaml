{{- if and .Values.mitmproxy.enabled .Values.ca.enabled }}
# ============================================================================
# ExternalSecret: CA-Keypair aus OpenBao
# ============================================================================
# Synchronisiert das mitmproxy-CA Keypair von OpenBao nach K8s Secret.
# Voraussetzung: ClusterSecretStore "openbao" (deployed via k8s-apps/external-secrets)
# Policy eso-read deckt apps/* ab — keine Policy-Aenderung noetig.
# ============================================================================
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: mitmproxy-ca
  namespace: {{ include "quarantine-wrapper.gwNamespace" . }}
  labels:
    {{- include "quarantine-wrapper.gwLabels" . | nindent 4 }}
    app.kubernetes.io/component: ca-distribution
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: {{ .Values.ca.secretName }}
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: Opaque
      engineVersion: v2
      mergePolicy: Replace
      metadata:
        labels:
          app.kubernetes.io/component: ca-distribution
          app.kubernetes.io/part-of: {{ .Values.appName }}-quarantine
      data:
        mitmproxy-ca-cert.pem: "{{ `{{ .cert }}` }}"
        mitmproxy-ca-key.pem: "{{ `{{ .key }}` }}"
  data:
    - secretKey: cert
      remoteRef:
        # ESO ergaenzt secret/data/ automatisch (ClusterSecretStore path: "secret", version: "v2")
        key: {{ include "quarantine-wrapper.openbaoCAPath" . }}
        property: cert
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: key
      remoteRef:
        key: {{ include "quarantine-wrapper.openbaoCAPath" . }}
        property: key
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
{{- end }}
---
{{- if and .Values.mitmproxy.enabled .Values.ca.enabled }}
# ============================================================================
# ExternalSecret: mitmweb Web-UI Password aus OpenBao
# ============================================================================
# Synchronisiert das zufaellig generierte mitmweb-Passwort nach K8s Secret.
# Generiert vom openbao-setup Job (Wave -5) beim ersten Sync.
# ============================================================================
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: mitmweb-password
  namespace: {{ include "quarantine-wrapper.gwNamespace" . }}
  labels:
    {{- include "quarantine-wrapper.gwLabels" . | nindent 4 }}
    app.kubernetes.io/component: mitmproxy
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: mitmweb-password
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: Opaque
      engineVersion: v2
      mergePolicy: Replace
      metadata:
        labels:
          app.kubernetes.io/component: mitmproxy
          app.kubernetes.io/part-of: {{ .Values.appName }}-quarantine
      data:
        password: "{{ `{{ .password }}` }}"
  data:
    - secretKey: password
      remoteRef:
        key: {{ include "quarantine-wrapper.openbaoMitmwebPath" . }}
        property: password
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
{{- end }}
---
{{- if .Values.authentik.enabled }}
# ============================================================================
# ExternalSecret: Authentik API-Token aus OpenBao
# ============================================================================
# Synchronisiert den Authentik API-Token fuer PostSync-Job.
# Wird nur erstellt wenn authentik.enabled UND kein manuelles Secret gesetzt.
# ============================================================================
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: authentik-api-token
  namespace: {{ include "quarantine-wrapper.gwNamespace" . }}
  annotations:
    argocd.argoproj.io/sync-wave: "-5"
  labels:
    {{- include "quarantine-wrapper.gwLabels" . | nindent 4 }}
    app.kubernetes.io/component: authentik-setup
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: {{ .Values.authentik.apiTokenSecret | default "authentik-api-token" }}
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: Opaque
      engineVersion: v2
      mergePolicy: Replace
      metadata:
        labels:
          app.kubernetes.io/component: authentik-setup
          app.kubernetes.io/part-of: {{ .Values.appName }}-quarantine
      data:
        token: "{{ `{{ .token }}` }}"
  data:
    - secretKey: token
      remoteRef:
        key: {{ include "quarantine-wrapper.openbaoAuthentikPath" . }}
        property: token
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
{{- end }}

