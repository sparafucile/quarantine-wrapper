{{- if and .Values.mitmproxy.enabled .Values.ca.enabled }}
# ============================================================================
# ExternalSecret: CA-Keypair aus OpenBao
# ============================================================================
# Synchronisiert das mitmproxy-CA Keypair von OpenBao nach K8s Secret.
# Voraussetzung: ClusterSecretStore "openbao" (deployed via k8s-apps/external-secrets)
# Policy eso-read deckt apps/* ab — keine Policy-Aenderung noetig.
# ============================================================================
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: mitmproxy-ca
  namespace: {{ include "quarantine-wrapper.gwNamespace" . }}
  labels:
    {{- include "quarantine-wrapper.gwLabels" . | nindent 4 }}
    app.kubernetes.io/component: ca-distribution
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: {{ .Values.ca.secretName }}
    template:
      type: Opaque
      metadata:
        labels:
          app.kubernetes.io/component: ca-distribution
          app.kubernetes.io/part-of: {{ .Values.appName }}-quarantine
      data:
        mitmproxy-ca-cert.pem: "{{ `{{ .cert }}` }}"
        mitmproxy-ca-key.pem: "{{ `{{ .key }}` }}"
  data:
    - secretKey: cert
      remoteRef:
        # ESO ergaenzt secret/data/ automatisch (ClusterSecretStore path: "secret", version: "v2")
        key: {{ include "quarantine-wrapper.openbaoCAPath" . }}
        property: cert
    - secretKey: key
      remoteRef:
        key: {{ include "quarantine-wrapper.openbaoCAPath" . }}
        property: key
{{- end }}
---
{{- if and .Values.openclaw.enabled .Values.openclaw.gemini.enabled }}
# ============================================================================
# ExternalSecret: Gemini API Key aus OpenBao
# ============================================================================
# Synchronisiert den Google Gemini API Key fuer OpenClaw.
# OpenBao-Pfad: infra/google-ai (bzw. openclaw.gemini.openbaoPath)
# ============================================================================
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: openclaw-gemini-key
  namespace: {{ include "quarantine-wrapper.appNamespace" . }}
  labels:
    {{- include "quarantine-wrapper.appLabels" . | nindent 4 }}
    app.kubernetes.io/component: openclaw
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: {{ .Values.openclaw.gemini.secretName }}
    template:
      type: Opaque
      metadata:
        labels:
          app.kubernetes.io/component: openclaw
          app.kubernetes.io/part-of: {{ .Values.appName }}-quarantine
      data:
        api-key: "{{ `{{ .api_key }}` }}"
  data:
    - secretKey: api_key
      remoteRef:
        key: {{ .Values.openclaw.gemini.openbaoPath | default "infra/google-ai" }}
        property: api-key
{{- end }}
---
{{- if .Values.authentik.enabled }}
# ============================================================================
# ExternalSecret: Authentik API-Token aus OpenBao
# ============================================================================
# Synchronisiert den Authentik API-Token fuer PostSync-Job.
# Wird nur erstellt wenn authentik.enabled UND kein manuelles Secret gesetzt.
# ============================================================================
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: authentik-api-token
  namespace: {{ include "quarantine-wrapper.gwNamespace" . }}
  labels:
    {{- include "quarantine-wrapper.gwLabels" . | nindent 4 }}
    app.kubernetes.io/component: authentik-setup
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: {{ .Values.authentik.apiTokenSecret | default "authentik-api-token" }}
    template:
      type: Opaque
      metadata:
        labels:
          app.kubernetes.io/component: authentik-setup
          app.kubernetes.io/part-of: {{ .Values.appName }}-quarantine
      data:
        token: "{{ `{{ .token }}` }}"
  data:
    - secretKey: token
      remoteRef:
        key: {{ include "quarantine-wrapper.openbaoAuthentikPath" . }}
        property: token
{{- end }}
