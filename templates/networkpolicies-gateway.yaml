# ============================================================================
# NetworkPolicies fuer den Gateway-Namespace (<appName>-quarantine-gw)
# ============================================================================

# Default-Deny: Blockiert JEGLICHEN Ingress und Egress
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: {{ include "quarantine-wrapper.gwNamespace" . }}
  labels:
    {{- include "quarantine-wrapper.gwLabels" . | nindent 4 }}
spec:
  podSelector: {}
  policyTypes:
    - Ingress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-egress
  namespace: {{ include "quarantine-wrapper.gwNamespace" . }}
  labels:
    {{- include "quarantine-wrapper.gwLabels" . | nindent 4 }}
spec:
  podSelector: {}
  policyTypes:
    - Egress
---
# Ingress: Nur Quarantine-Pods duerfen den Proxy nutzen
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-from-quarantine
  namespace: {{ include "quarantine-wrapper.gwNamespace" . }}
  labels:
    {{- include "quarantine-wrapper.gwLabels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app: egress-proxy
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ include "quarantine-wrapper.appNamespace" . }}
      ports:
        - protocol: TCP
          port: {{ .Values.squid.port }}
        {{- if .Values.mitmproxy.enabled }}
        - protocol: TCP
          port: {{ .Values.mitmproxy.proxyPort }}
        {{- end }}
---
{{- if .Values.mitmproxy.enabled }}
# Ingress: mitmweb UI (LAN + Gateway)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-mitmweb-ui
  namespace: {{ include "quarantine-wrapper.gwNamespace" . }}
  labels:
    {{- include "quarantine-wrapper.gwLabels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app: mitmproxy-debug
  policyTypes:
    - Ingress
  ingress:
    - from:
        - ipBlock:
            cidr: {{ .Values.network.lanCIDR }}
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: gateway-system
      ports:
        - protocol: TCP
          port: {{ .Values.mitmproxy.webPort }}
---
{{- end }}
# ArgoCD Ingress fuer Gateway-Namespace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-argocd-ingress
  namespace: {{ include "quarantine-wrapper.gwNamespace" . }}
  labels:
    {{- include "quarantine-wrapper.gwLabels" . | nindent 4 }}
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: argocd
---
# DNS fuer Proxy-Namespace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns
  namespace: {{ include "quarantine-wrapper.gwNamespace" . }}
  labels:
    {{- include "quarantine-wrapper.gwLabels" . | nindent 4 }}
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
---
{{- if .Values.ca.enabled }}
# CA-Distributor: Egress zum K8s API-Server + DNS (Defense-in-Depth)
# Die eigentliche Freigabe erfolgt via CiliumNetworkPolicy (toEntities: kube-apiserver)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ca-distributor-egress
  namespace: {{ include "quarantine-wrapper.gwNamespace" . }}
  labels:
    {{- include "quarantine-wrapper.gwLabels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: ca-distribution
  policyTypes:
    - Egress
  egress:
    # K8s API-Server (Service-CIDR:443, nach DNAT Master-Node-IPs:6443)
    - to:
        - ipBlock:
            cidr: {{ .Values.network.serviceCIDR }}
      ports:
        - protocol: TCP
          port: 443
    # DNS
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
---
{{- end }}
{{- if .Values.mitmproxy.enabled }}
# mitmproxy -> Squid (upstream proxy chain innerhalb des GW-Namespace)
# mitmproxy ist erster Hop (TLS-Interception + Sichtbarkeit), Squid filtert danach
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-mitmproxy-to-squid
  namespace: {{ include "quarantine-wrapper.gwNamespace" . }}
  labels:
    {{- include "quarantine-wrapper.gwLabels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app: mitmproxy-debug
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: egress-proxy
              component: squid
      ports:
        - protocol: TCP
          port: {{ .Values.squid.port }}
---
# Squid: Ingress von mitmproxy (upstream proxy chain)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-squid-from-mitmproxy
  namespace: {{ include "quarantine-wrapper.gwNamespace" . }}
  labels:
    {{- include "quarantine-wrapper.gwLabels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app: egress-proxy
      component: squid
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: mitmproxy-debug
      ports:
        - protocol: TCP
          port: {{ .Values.squid.port }}
---
{{- end }}
# Proxy darf ins Internet (NICHT ins LAN, Pod-CIDR, Service-CIDR)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-internet-egress
  namespace: {{ include "quarantine-wrapper.gwNamespace" . }}
  labels:
    {{- include "quarantine-wrapper.gwLabels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app: egress-proxy
  policyTypes:
    - Egress
  egress:
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
            except:
              - {{ .Values.network.podCIDR }}
              - {{ .Values.network.serviceCIDR }}
              - {{ .Values.network.lanCIDR }}
              - 169.254.0.0/16
      ports:
        - protocol: TCP
          port: 80
        - protocol: TCP
          port: 443
{{- if .Values.authentik.enabled }}
---
# Authentik-Egress: PostSync-Job muss Authentik-API erreichen
# WICHTIG: Zwei "to"-Regeln noetig weil Cilium die Policy VOR dem DNAT evaluiert.
# Die namespaceSelector matcht die Authentik-Pods (nach DNAT), die ipBlock matcht
# die Authentik-Service ClusterIP (vor DNAT). Beides auf Port 80/443 begrenzt.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-authentik-egress
  namespace: {{ include "quarantine-wrapper.gwNamespace" . }}
  labels:
    {{- include "quarantine-wrapper.gwLabels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: authentik-setup
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.authentik.namespace }}
        - ipBlock:
            cidr: {{ .Values.network.serviceCIDR }}
      ports:
        - protocol: TCP
          port: 80
        - protocol: TCP
          port: 443
{{- end }}
{{- if and .Values.mitmproxy.enabled .Values.ca.enabled }}
---
# OpenBao-Setup: Egress zu OpenBao fuer CA-Generierung
# Wird auf nachfolgenden Syncs benoetigt (beim ersten Sync existieren
# noch keine Policies, daher ist der Job sowieso uneingeschraenkt)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-openbao-setup-egress
  namespace: {{ include "quarantine-wrapper.gwNamespace" . }}
  labels:
    {{- include "quarantine-wrapper.gwLabels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: openbao-setup
  policyTypes:
    - Egress
  egress:
    # OpenBao Service (via ClusterIP pre-DNAT + Pods post-DNAT)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: openbao
        - ipBlock:
            cidr: {{ .Values.network.serviceCIDR }}
      ports:
        - protocol: TCP
          port: 8200
    # DNS
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
{{- end }}
{{- if .Values.egress.extraEgressRules }}
---
# Extra-Egress-Rules (aus values.yaml)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-extra-egress
  namespace: {{ include "quarantine-wrapper.appNamespace" . }}
  labels:
    {{- include "quarantine-wrapper.appLabels" . | nindent 4 }}
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    {{- toYaml .Values.egress.extraEgressRules | nindent 4 }}
{{- end }}
