# ============================================================
# OpenClaw Quarantine-Umgebung
# ============================================================
appName: openclaw

services:
  - name: web
    port: 8080
    hostname: p-openclaw-k8s.sparafucile.net
    authentik:
      enabled: true
      skipPathRegex: "^/api/v1/"

egress:
  squidAllowedDomains:
    - generativelanguage.googleapis.com    # Google Gemini API
    - api.mistral.ai                       # Mistral API
    - api.telegram.org                     # Telegram Bot API
    - registry.npmjs.org                   # npm (fuer Extension-Dependencies wie matrix-bot-sdk)
    - deb.debian.org                       # Debian Packages (nano initContainer)
    - security.debian.org                  # Debian Security Updates
    - github.com                           # OpenClaw Updates
    - objects.githubusercontent.com        # GitHub Release Assets
    - openclaw.ai                          # OpenClaw Heartbeat/Updates
  extraEgressRules: []

mitmproxy:
  enabled: true
  authentik:
    enabled: true

ca:
  enabled: true

helloWorld:
  enabled: true

authentik:
  enabled: true
  apiTokenSecret: authentik-api-token
  outpostPk: 1
