# ============================================================
# Quarantine-Wrapper: Showcase-Deployment
# ============================================================
# Demonstriert die v2-Architektur mit:
# - HelloWorld Debug-Pod (Wrapper-intern)
# - Kyverno-basierter transparenter Proxy/CA-Injection
# - OpenClaw wird separat als eigenes Helm Chart deployed
# ============================================================

appName: "showcase"

# v2: Kyverno-Injection aktiv
kyverno:
  enabled: true

# v2: Keine Port-Restriction (port-agnostisch)
# Apps deployed in diesen Namespace werden von Gateway/LAN auf allen Ports erreichbar
ingressPorts: []

# HelloWorld Debug-Pod aktivieren
helloWorld:
  enabled: true
  port: 8080

# Squid-Whitelist: OpenClaw-Domains + Basis
egress:
  squidAllowedDomains:
    - generativelanguage.googleapis.com    # Google Gemini API
    - api.telegram.org                     # Telegram Bot API
    - deb.debian.org                       # Debian Packages
    - security.debian.org                  # Debian Security Updates
    - github.com                           # GitHub
    - openclaw.ai                          # OpenClaw Updates/Docs

# mitmproxy aktiv (Debug-Proxy mit TLS-Interception)
mitmproxy:
  enabled: true

# CA aktiv (fuer TLS-Interception)
ca:
  enabled: true

# Authentik SSO
authentik:
  enabled: true
