# ============================================================================
# CiliumNetworkPolicies
# ============================================================================
# K8s NetworkPolicies erkennen Cilium-Identitaeten wie reserved:host und
# reserved:ingress NICHT. Daher sind zusaetzliche CiliumNetworkPolicies noetig
# fuer Gateway API (hostNetwork Envoy) und K8s API-Server Zugriff.
# ============================================================================

# --- App-Namespace: Gateway Envoy Ingress ---
# Erlaubt Cilium Envoy (hostNetwork Gateway API) Zugriff auf Quarantine-Pods.
# Ohne diese Policy: 503 "upstream connect error, connection timeout"
# Wenn ingressPorts leer und helloWorld aus: alle Ports erlaubt (port-agnostisch)
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-gateway-envoy-ingress
  namespace: {{ include "quarantine-wrapper.appNamespace" . }}
  labels:
    {{- include "quarantine-wrapper.appLabels" . | nindent 4 }}
spec:
  endpointSelector: {}
  ingress:
    - fromEntities:
        - host
        - ingress
        - kube-apiserver
      {{- if or .Values.ingressPorts .Values.helloWorld.enabled }}
      toPorts:
        - ports:
            {{- range .Values.ingressPorts }}
            - port: "{{ . }}"
              protocol: TCP
            {{- end }}
            {{- if .Values.helloWorld.enabled }}
            - port: "{{ .Values.helloWorld.port }}"
              protocol: TCP
            {{- end }}
      {{- end }}
---
{{- if .Values.cilium.l7Visibility }}
# L7-Visibility fuer Quarantine-Pods (Hubble HTTP-Monitoring)
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: quarantine-l7-visibility
  namespace: {{ include "quarantine-wrapper.appNamespace" . }}
  labels:
    {{- include "quarantine-wrapper.appLabels" . | nindent 4 }}
spec:
  endpointSelector: {}
  egress:
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: {{ include "quarantine-wrapper.gwNamespace" . }}
            app: egress-proxy
      toPorts:
        - ports:
            - port: "{{ .Values.squid.port }}"
              protocol: TCP
            {{- if .Values.mitmproxy.enabled }}
            - port: "{{ .Values.mitmproxy.proxyPort }}"
              protocol: TCP
            {{- end }}
          rules:
            http:
              - {}
---
{{- end }}
# --- Gateway-Namespace: Gateway Envoy Ingress (mitmweb UI) ---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-gateway-envoy-ingress
  namespace: {{ include "quarantine-wrapper.gwNamespace" . }}
  labels:
    {{- include "quarantine-wrapper.gwLabels" . | nindent 4 }}
spec:
  endpointSelector: {}
  ingress:
    - fromEntities:
        - host
        - ingress
        - kube-apiserver
      toPorts:
        - ports:
            {{- if .Values.mitmproxy.enabled }}
            - port: "{{ .Values.mitmproxy.webPort }}"
              protocol: TCP
            {{- end }}
{{- if .Values.authentik.enabled }}
---
# --- Gateway-Namespace: Authentik-Setup Egress ---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-authentik-setup-egress
  namespace: {{ include "quarantine-wrapper.gwNamespace" . }}
  labels:
    {{- include "quarantine-wrapper.gwLabels" . | nindent 4 }}
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/component: authentik-setup
  egress:
    - toCIDR:
        - {{ .Values.network.serviceCIDR }}
      toPorts:
        - ports:
            - port: "80"
              protocol: TCP
            - port: "443"
              protocol: TCP
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: {{ .Values.authentik.namespace }}
      toPorts:
        - ports:
            - port: "80"
              protocol: TCP
            - port: "443"
              protocol: TCP
            - port: "9000"
              protocol: TCP
            - port: "9443"
              protocol: TCP
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
{{- end }}
---
{{- if and .Values.mitmproxy.enabled .Values.ca.enabled }}
---
# --- Gateway-Namespace: OpenBao-Setup Egress ---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-openbao-setup-egress
  namespace: {{ include "quarantine-wrapper.gwNamespace" . }}
  labels:
    {{- include "quarantine-wrapper.gwLabels" . | nindent 4 }}
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/component: openbao-setup
  egress:
    - toCIDR:
        - {{ .Values.network.serviceCIDR }}
      toPorts:
        - ports:
            - port: "8200"
              protocol: TCP
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: openbao
      toPorts:
        - ports:
            - port: "8200"
              protocol: TCP
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
{{- end }}
{{- if .Values.ca.enabled }}
---
# --- Gateway-Namespace: CA-Distributor K8s API-Server Zugriff ---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-ca-distributor-apiserver
  namespace: {{ include "quarantine-wrapper.gwNamespace" . }}
  labels:
    {{- include "quarantine-wrapper.gwLabels" . | nindent 4 }}
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/component: ca-distribution
  egress:
    - toEntities:
        - kube-apiserver
{{- end }}
{{- if .Values.authentik.enabled }}
---
# --- Gateway-Namespace: Authentik-Setup K8s API-Server Zugriff ---
# Service-Discovery braucht K8s API Zugriff. Standard-NetworkPolicy ipBlock
# reicht nicht, da Cilium K8s-API-Traffic auf Master-Node-IPs DNATet.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-authentik-setup-apiserver
  namespace: {{ include "quarantine-wrapper.gwNamespace" . }}
  labels:
    {{- include "quarantine-wrapper.gwLabels" . | nindent 4 }}
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/component: authentik-setup
  egress:
    - toEntities:
        - kube-apiserver
---
# --- Gateway-Namespace: Authentik-Cleanup Egress ---
# Spiegelt allow-authentik-setup-egress fuer den PreDelete-Hook.
# Ohne diese Policy kann der Cleanup-Job die Authentik-API nicht erreichen
# und die ArgoCD-App-Loeschung haengt am PreDelete-Finalizer.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-authentik-cleanup-egress
  namespace: {{ include "quarantine-wrapper.gwNamespace" . }}
  labels:
    {{- include "quarantine-wrapper.gwLabels" . | nindent 4 }}
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/component: authentik-cleanup
  egress:
    - toCIDR:
        - {{ .Values.network.serviceCIDR }}
      toPorts:
        - ports:
            - port: "80"
              protocol: TCP
            - port: "443"
              protocol: TCP
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: {{ .Values.authentik.namespace }}
      toPorts:
        - ports:
            - port: "80"
              protocol: TCP
            - port: "443"
              protocol: TCP
            - port: "9000"
              protocol: TCP
            - port: "9443"
              protocol: TCP
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
---
# --- Gateway-Namespace: Authentik-Cleanup K8s API-Server Zugriff ---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-authentik-cleanup-apiserver
  namespace: {{ include "quarantine-wrapper.gwNamespace" . }}
  labels:
    {{- include "quarantine-wrapper.gwLabels" . | nindent 4 }}
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/component: authentik-cleanup
  egress:
    - toEntities:
        - kube-apiserver
{{- end }}

{{- if .Values.controlcenter.enabled }}
---
# --- Gateway-Namespace: ControlCenter K8s API-Server + Egress ---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-controlcenter-egress
  namespace: {{ include "quarantine-wrapper.gwNamespace" . }}
  labels:
    {{- include "quarantine-wrapper.gwLabels" . | nindent 4 }}
spec:
  endpointSelector:
    matchLabels:
      app: controlcenter
  egress:
    - toEntities:
        - kube-apiserver
    - toCIDR:
        - {{ .Values.network.serviceCIDR }}
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
    {{- if .Values.mitmproxy.enabled }}
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: {{ include "quarantine-wrapper.gwNamespace" . }}
            app: mitmproxy-debug
      toPorts:
        - ports:
            - port: "{{ .Values.mitmproxy.webPort }}"
              protocol: TCP
            - port: "{{ .Values.mitmproxy.proxyPort }}"
              protocol: TCP
    {{- end }}
    # Gitea + ArgoCD (external via Cloudflare)
    - toCIDR:
        - 0.0.0.0/0
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
{{- end }}
