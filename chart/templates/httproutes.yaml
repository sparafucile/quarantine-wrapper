# ============================================================================
# HTTPRoutes
# ============================================================================
# v2: App-Services bringen ihre eigenen HTTPRoutes mit.
# Der Wrapper erstellt nur noch die mitmweb HTTPRoute fuer das Debug-UI
# und die helloWorld HTTPRoute fuer den Test-Pod.
# ============================================================================

{{- if .Values.helloWorld.enabled }}
---
# HelloWorld HTTPRoute (Debug-Pod)
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .Values.appName }}-hello-world
  namespace: {{ include "quarantine-wrapper.appNamespace" . }}
  annotations:
    external-dns.alpha.kubernetes.io/hostname: {{ include "quarantine-wrapper.helloWorldHostname" . }}
  labels:
    {{- include "quarantine-wrapper.appLabels" . | nindent 4 }}
spec:
  parentRefs:
    - name: {{ .Values.gateway.name }}
      namespace: {{ .Values.gateway.namespace }}
      sectionName: {{ .Values.gateway.sectionName }}
  hostnames:
    - {{ include "quarantine-wrapper.helloWorldHostname" . }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        {{- if .Values.authentik.enabled }}
        - name: authentik-server
          namespace: {{ .Values.authentik.namespace }}
          port: 80
        {{- else }}
        - name: hello-world
          port: {{ .Values.helloWorld.port }}
        {{- end }}
{{- end }}

{{- if .Values.mitmproxy.enabled }}
---
# mitmweb HTTPRoute
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .Values.appName }}-mitmweb
  namespace: {{ include "quarantine-wrapper.gwNamespace" . }}
  annotations:
    external-dns.alpha.kubernetes.io/hostname: {{ include "quarantine-wrapper.mitmwebHostname" . }}
  labels:
    {{- include "quarantine-wrapper.gwLabels" . | nindent 4 }}
spec:
  parentRefs:
    - name: {{ .Values.gateway.name }}
      namespace: {{ .Values.gateway.namespace }}
      sectionName: {{ .Values.gateway.sectionName }}
  hostnames:
    - {{ include "quarantine-wrapper.mitmwebHostname" . }}
  rules:
    - backendRefs:
        {{- if and .Values.authentik.enabled .Values.mitmproxy.authentik.enabled }}
        - name: authentik-server
          namespace: {{ .Values.authentik.namespace }}
          port: 80
        {{- else }}
        - name: mitmproxy
          port: {{ .Values.mitmproxy.webPort }}
        {{- end }}
{{- end }}

{{- if .Values.controlcenter.enabled }}
---
# ControlCenter HTTPRoute
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .Values.appName }}-controlcenter
  namespace: {{ include "quarantine-wrapper.gwNamespace" . }}
  annotations:
    external-dns.alpha.kubernetes.io/hostname: {{ include "quarantine-wrapper.ccHostname" . }}
  labels:
    {{- include "quarantine-wrapper.gwLabels" . | nindent 4 }}
spec:
  parentRefs:
    - name: {{ .Values.gateway.name }}
      namespace: {{ .Values.gateway.namespace }}
      sectionName: {{ .Values.gateway.sectionName }}
  hostnames:
    - {{ include "quarantine-wrapper.ccHostname" . }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        {{- if .Values.authentik.enabled }}
        - name: authentik-server
          namespace: {{ .Values.authentik.namespace }}
          port: 80
        {{- else }}
        - name: controlcenter
          port: {{ .Values.controlcenter.port }}
        {{- end }}
{{- end }}
