{{- if .Values.authentik.enabled }}
# ============================================================================
# Authentik-Setup PostSync-Job
# ============================================================================
# Erstellt/aktualisiert idempotent:
# - Proxy-Provider fuer jeden Service mit authentik.enabled: true
# - Proxy-Provider fuer mitmweb (wenn mitmproxy.authentik.enabled: true)
# - Application pro Provider (Gruppe: Quarantine)
# - PATCH des Embedded Outpost (providers-Array aktualisieren)
# ============================================================================

# --- ConfigMap mit dem Python-Script ---
apiVersion: v1
kind: ConfigMap
metadata:
  name: authentik-setup-script
  namespace: {{ include "quarantine-wrapper.gwNamespace" . }}
  labels:
    {{- include "quarantine-wrapper.gwLabels" . | nindent 4 }}
data:
  setup-authentik.py: |
    #!/usr/bin/env python3
    """Idempotent Authentik Proxy-Provider + Application Setup.
    Laeuft als PostSync-Job nach jedem ArgoCD Sync."""
    import urllib.request, json, ssl, os, sys, socket

    # Unbuffered output
    sys.stdout.reconfigure(line_buffering=True)

    AUTHENTIK_URL = os.environ.get("AUTHENTIK_URL", "http://authentik-server.authentik.svc.p-k8s-cluster.local")

    # Token might be empty if ExternalSecret hasn't synced the K8s Secret yet.
    # In that case, poll the K8s API until the Secret appears.
    import time
    API_TOKEN = os.environ.get("AUTHENTIK_TOKEN", "")
    if not API_TOKEN:
        print("AUTHENTIK_TOKEN not set (ExternalSecret may still be syncing)")
        print("Polling K8s API for Secret...")
        secret_name = "{{ .Values.authentik.apiTokenSecret | default "authentik-api-token" }}"
        ns = "{{ include "quarantine-wrapper.gwNamespace" . }}"
        k8s_token_path = "/var/run/secrets/kubernetes.io/serviceaccount/token"
        k8s_ca_path = "/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"
        try:
            with open(k8s_token_path) as f:
                k8s_token = f.read().strip()
            k8s_ctx = ssl.create_default_context(cafile=k8s_ca_path)
            for attempt in range(12):
                try:
                    req = urllib.request.Request(
                        f"https://kubernetes.default.svc/api/v1/namespaces/{ns}/secrets/{secret_name}",
                        headers={"Authorization": f"Bearer {k8s_token}", "Accept": "application/json"},
                    )
                    resp = urllib.request.urlopen(req, timeout=5, context=k8s_ctx)
                    import base64
                    data = json.loads(resp.read())
                    API_TOKEN = base64.b64decode(data["data"]["token"]).decode()
                    print(f"  Token found via K8s API after {(attempt+1)*5}s")
                    break
                except Exception:
                    time.sleep(5)
                    if attempt < 11:
                        print(f"  Waiting... ({(attempt+1)*5}s)")
            if not API_TOKEN:
                print("ERROR: Secret not available after 60s, aborting")
                sys.exit(1)
        except FileNotFoundError:
            print("ERROR: No K8s SA token — cannot poll for Secret")
            sys.exit(1)
    OUTPOST_PK = int(os.environ.get("OUTPOST_PK", "{{ .Values.authentik.outpostPk }}"))
    HTTP_TIMEOUT = 15  # seconds

    print(f"Authentik URL: {AUTHENTIK_URL}")
    print(f"Outpost PK: {OUTPOST_PK}")
    print(f"HTTP Timeout: {HTTP_TIMEOUT}s")

    # Pre-flight: test TCP connectivity
    print("\n=== Pre-flight: Testing TCP connectivity ===")
    try:
        s = socket.socket(socket.AF_INET, socket.SOCK_STREAM)
        s.settimeout(10)
        host = AUTHENTIK_URL.replace("http://", "").replace("https://", "").split(":")[0]
        port = 443 if "https" in AUTHENTIK_URL else 80
        s.connect((host, port))
        s.close()
        print(f"TCP OK: {host}:{port}")
    except Exception as e:
        print(f"TCP FAILED: {host}:{port} - {e}")
        print("Aborting - cannot reach Authentik")
        sys.exit(1)

    APP_NAMESPACE = "{{ include "quarantine-wrapper.appNamespace" . }}"
    APP_NAME = "{{ .Values.appName }}"
    K8S_CLUSTER_DOMAIN = "p-k8s-cluster.local"

    # --- Statische Services (Wrapper-eigene) ---
    SERVICES = [
    {{- if and .Values.mitmproxy.enabled .Values.mitmproxy.authentik.enabled }}
        {
            "name": "{{ include "quarantine-wrapper.gwNamespace" . }}-mitmweb",
            "external_host": "https://{{ include "quarantine-wrapper.mitmwebHostname" . }}",
            "internal_host": "http://mitmproxy.{{ include "quarantine-wrapper.gwNamespace" . }}.svc.p-k8s-cluster.local:{{ .Values.mitmproxy.webPort }}",
            "skip_path_regex": "",
        },
    {{- end }}
    ]

    # --- Dynamische Service-Discovery aus App- UND GW-Namespace ---
    # Services die einen Authentik Proxy Provider benoetigen, setzen:
    #   Label: quarantine.sparafucile.net/authentik: "true"
    #   Annotation: quarantine.sparafucile.net/external-host: "https://p-<app>-k8s.sparafucile.net"
    #   Annotation: quarantine.sparafucile.net/skip-path-regex: "" (optional)
    GW_NAMESPACE = "{{ include "quarantine-wrapper.gwNamespace" . }}"
    DISCOVERY_NAMESPACES = [APP_NAMESPACE, GW_NAMESPACE]

    k8s_token_path = "/var/run/secrets/kubernetes.io/serviceaccount/token"
    k8s_ca_path = "/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"

    try:
        with open(k8s_token_path) as f:
            k8s_token = f.read().strip()

        k8s_ctx = ssl.create_default_context(cafile=k8s_ca_path)
        k8s_headers = {
            "Authorization": f"Bearer {k8s_token}",
            "Accept": "application/json",
        }

        for disco_ns in DISCOVERY_NAMESPACES:
            print(f"\n=== Discovering services in namespace: {disco_ns} ===")
            svc_url = f"https://kubernetes.default.svc/api/v1/namespaces/{disco_ns}/services?labelSelector=quarantine.sparafucile.net/authentik%3Dtrue"
            req = urllib.request.Request(svc_url, headers=k8s_headers)
            resp = urllib.request.urlopen(req, timeout=10, context=k8s_ctx)
            svc_data = json.loads(resp.read())

            for svc in svc_data.get("items", []):
                svc_name = svc["metadata"]["name"]
                annotations = svc["metadata"].get("annotations", {})
                external_host = annotations.get("quarantine.sparafucile.net/external-host", "")
                skip_regex = annotations.get("quarantine.sparafucile.net/skip-path-regex", "")

                if not external_host:
                    print(f"  SKIP {svc_name}: missing external-host annotation")
                    continue

                # Duplikat-Check (mitmweb koennte statisch UND dynamisch entdeckt werden)
                provider_name = f"{disco_ns}-{svc_name}"
                if any(s["name"] == provider_name for s in SERVICES):
                    print(f"  SKIP {provider_name}: already in static list")
                    continue

                # Ersten Port verwenden
                ports = svc.get("spec", {}).get("ports", [])
                port = ports[0]["port"] if ports else 80

                internal_host = f"http://{svc_name}.{disco_ns}.svc.{K8S_CLUSTER_DOMAIN}:{port}"

                print(f"  Discovered: {provider_name} -> {external_host} (internal: {internal_host})")
                SERVICES.append({
                    "name": provider_name,
                    "external_host": external_host,
                    "internal_host": internal_host,
                    "skip_path_regex": skip_regex,
                })

    except FileNotFoundError:
        print("  WARNING: No K8s service account token found — running outside cluster? Skipping discovery.")
    except Exception as e:
        print(f"  WARNING: Service discovery failed: {e}")
        print("  Continuing with static services only.")

    headers = {
        "Authorization": f"Bearer {API_TOKEN}",
        "Content-Type": "application/json",
    }
    ctx = ssl.create_default_context()
    ctx.check_hostname = False
    ctx.verify_mode = ssl.CERT_NONE

    def api_call(method, path, data=None):
        url = f"{AUTHENTIK_URL}{path}"
        body = json.dumps(data).encode() if data else None
        req = urllib.request.Request(url, data=body, headers=headers, method=method)
        try:
            resp = urllib.request.urlopen(req, timeout=HTTP_TIMEOUT, context=ctx)
            resp_body = resp.read()
            return json.loads(resp_body) if resp_body else {}
        except urllib.error.HTTPError as e:
            err_body = e.read().decode()
            print(f"  ERROR {e.code}: {err_body}")
            if e.code == 404:
                return None
            raise

    def find_provider(name):
        result = api_call("GET", f"/api/v3/providers/proxy/?search={name}")
        for p in result.get("results", []):
            if p["name"] == name:
                return p
        return None

    def find_application(slug):
        result = api_call("GET", f"/api/v3/core/applications/{slug}/")
        return result

    # Flows laden (authorization + invalidation)
    print("\n=== Loading Authentik Flows ===")
    auth_flow = None
    invalidation_flow = None
    flows = api_call("GET", "/api/v3/flows/instances/?ordering=slug")
    for f in flows.get("results", []):
        designation = f.get("designation", "")
        if designation == "authorization" and not auth_flow:
            auth_flow = f["pk"]
            print(f"  Authorization flow: {f['slug']} (pk={auth_flow})")
        if designation == "invalidation" and not invalidation_flow:
            invalidation_flow = f["pk"]
            print(f"  Invalidation flow: {f['slug']} (pk={invalidation_flow})")
    if not auth_flow or not invalidation_flow:
        print("  ERROR: Could not find required flows!")
        sys.exit(1)

    created_provider_pks = []

    for svc in SERVICES:
        name = svc["name"]
        print(f"\n=== Processing: {name} ===")

        # 1. Provider erstellen/aktualisieren
        provider = find_provider(name)
        provider_data = {
            "name": name,
            "authorization_flow": auth_flow,
            "invalidation_flow": invalidation_flow,
            "external_host": svc["external_host"],
            "internal_host": svc["internal_host"],
            "mode": "proxy",
        }
        if svc["skip_path_regex"]:
            provider_data["skip_path_regex"] = svc["skip_path_regex"]

        if provider:
            print(f"  Provider exists (pk={provider['pk']}), updating...")
            api_call("PATCH", f"/api/v3/providers/proxy/{provider['pk']}/", provider_data)
            provider_pk = provider["pk"]
        else:
            print(f"  Creating provider...")
            result = api_call("POST", "/api/v3/providers/proxy/", provider_data)
            provider_pk = result["pk"]
            print(f"  Created provider (pk={provider_pk})")

        created_provider_pks.append(provider_pk)

        # 2. Application erstellen/aktualisieren
        slug = name
        app = find_application(slug)
        app_data = {
            "name": name,
            "slug": slug,
            "provider": provider_pk,
            "group": "Quarantine",
        }

        if app:
            print(f"  Application exists, updating...")
            api_call("PATCH", f"/api/v3/core/applications/{slug}/", app_data)
        else:
            print(f"  Creating application...")
            try:
                api_call("POST", "/api/v3/core/applications/", app_data)
                print(f"  Created application: {slug}")
            except urllib.error.HTTPError as e:
                if e.code == 400:
                    # Provider already linked to another application (different slug from earlier deployment).
                    # Find the existing application by searching all apps for this provider PK.
                    print(f"  Provider already linked — searching for existing application...")
                    all_apps = api_call("GET", f"/api/v3/core/applications/?provider={provider_pk}")
                    for existing in (all_apps or {}).get("results", []):
                        old_slug = existing["slug"]
                        print(f"  Found existing app: {old_slug} (pk={existing.get('pk','')}), updating...")
                        api_call("PATCH", f"/api/v3/core/applications/{old_slug}/", app_data)
                        break
                    else:
                        print(f"  WARNING: Could not find linked application, skipping")
                else:
                    raise

    # 3. Embedded Outpost aktualisieren
    if created_provider_pks:
        print(f"\n=== Updating Embedded Outpost ===")
        # Auto-discover: Embedded Outpost finden
        outpost = None
        outpost_pk = None
        # Erst per konfiguriertem PK versuchen
        if OUTPOST_PK:
            outpost = api_call("GET", f"/api/v3/outposts/instances/{OUTPOST_PK}/")
            if outpost:
                outpost_pk = OUTPOST_PK
                print(f"  Found outpost by PK={OUTPOST_PK}: {outpost.get('name','?')}")
        # Fallback: Alle Outposts durchsuchen, Embedded finden
        if not outpost:
            print(f"  Outpost PK={OUTPOST_PK} not found, searching for embedded outpost...")
            all_outposts = api_call("GET", "/api/v3/outposts/instances/?ordering=name")
            for o in all_outposts.get("results", []):
                print(f"    Found: {o['name']} (pk={o['pk']}, type={o.get('type','?')})")
                if "embedded" in o.get("name", "").lower() or o.get("type") == "proxy":
                    outpost = o
                    outpost_pk = o["pk"]
                    print(f"  Using outpost: {o['name']} (pk={outpost_pk})")
                    break
        if outpost:
            current_providers = outpost.get("providers", [])
            # Merge: bestehende Provider behalten, neue hinzufuegen
            all_providers = list(set(current_providers + created_provider_pks))
            api_call("PATCH", f"/api/v3/outposts/instances/{outpost_pk}/", {
                "providers": all_providers,
            })
            print(f"  Outpost updated: {len(current_providers)} -> {len(all_providers)} providers")
        else:
            print("  WARNING: No suitable outpost found! Providers created but not assigned to outpost.")

    print("\n=== Authentik setup complete ===")
---
# --- PostSync-Job ---
apiVersion: batch/v1
kind: Job
metadata:
  name: authentik-setup
  namespace: {{ include "quarantine-wrapper.gwNamespace" . }}
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
  labels:
    {{- include "quarantine-wrapper.gwLabels" . | nindent 4 }}
    app.kubernetes.io/component: authentik-setup
spec:
  backoffLimit: 3
  activeDeadlineSeconds: 120
  template:
    metadata:
      labels:
        app.kubernetes.io/component: authentik-setup
    spec:
      serviceAccountName: authentik-setup
      restartPolicy: OnFailure
      containers:
        - name: setup
          image: {{ .Values.ca.distributorImage.repository }}:{{ .Values.ca.distributorImage.tag }}
          command: ["python3", "/scripts/setup-authentik.py"]
          env:
            - name: AUTHENTIK_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.authentik.apiTokenSecret | default "authentik-api-token" }}
                  key: token
                  optional: true
            - name: OUTPOST_PK
              value: "{{ .Values.authentik.outpostPk }}"
          volumeMounts:
            - name: script
              mountPath: /scripts
              readOnly: true
          resources:
            requests:
              memory: "32Mi"
              cpu: "10m"
            limits:
              memory: "64Mi"
              cpu: "100m"
      volumes:
        - name: script
          configMap:
            name: authentik-setup-script
{{- end }}
