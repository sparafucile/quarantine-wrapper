# ============================================================================
# NetworkPolicies fuer den App-Namespace (<appName>-quarantine)
# ============================================================================

# Default-Deny: Blockiert JEGLICHEN Ingress und Egress
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: {{ include "quarantine-wrapper.appNamespace" . }}
  labels:
    {{- include "quarantine-wrapper.appLabels" . | nindent 4 }}
spec:
  podSelector: {}
  policyTypes:
    - Ingress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-egress
  namespace: {{ include "quarantine-wrapper.appNamespace" . }}
  labels:
    {{- include "quarantine-wrapper.appLabels" . | nindent 4 }}
spec:
  podSelector: {}
  policyTypes:
    - Egress
---
# Pod-zu-Pod innerhalb des App-Namespace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-intra-namespace
  namespace: {{ include "quarantine-wrapper.appNamespace" . }}
  labels:
    {{- include "quarantine-wrapper.appLabels" . | nindent 4 }}
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector: {}
  egress:
    - to:
        - podSelector: {}
---
# DNS (CoreDNS in kube-system)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns
  namespace: {{ include "quarantine-wrapper.appNamespace" . }}
  labels:
    {{- include "quarantine-wrapper.appLabels" . | nindent 4 }}
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
---
# Egress zum Proxy-Gateway (Squid + mitmproxy)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-egress-to-proxy
  namespace: {{ include "quarantine-wrapper.appNamespace" . }}
  labels:
    {{- include "quarantine-wrapper.appLabels" . | nindent 4 }}
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    {{- if .Values.mitmproxy.enabled }}
    # Bei aktiver Proxy-Kette: Quarantine -> mitmproxy (erster Hop)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ include "quarantine-wrapper.gwNamespace" . }}
          podSelector:
            matchLabels:
              app: mitmproxy-debug
      ports:
        - protocol: TCP
          port: {{ .Values.mitmproxy.proxyPort }}
    {{- else }}
    # Ohne mitmproxy: Quarantine -> Squid direkt
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ include "quarantine-wrapper.gwNamespace" . }}
          podSelector:
            matchLabels:
              app: egress-proxy
      ports:
        - protocol: TCP
          port: {{ .Values.squid.port }}
    {{- end }}
---
# ArgoCD Ingress (fuer App-Management)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-argocd-ingress
  namespace: {{ include "quarantine-wrapper.appNamespace" . }}
  labels:
    {{- include "quarantine-wrapper.appLabels" . | nindent 4 }}
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: argocd
---
# LAN + kube-system + gateway-system Ingress
# Ports konfigurierbar via ingressPorts[] (v2: Apps bringen eigene Services mit)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-lan-ingress
  namespace: {{ include "quarantine-wrapper.appNamespace" . }}
  labels:
    {{- include "quarantine-wrapper.appLabels" . | nindent 4 }}
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - ipBlock:
            cidr: {{ .Values.network.lanCIDR }}
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: gateway-system
      {{- if or .Values.ingressPorts .Values.helloWorld.enabled }}
      ports:
        {{- range .Values.ingressPorts }}
        - protocol: TCP
          port: {{ . }}
        {{- end }}
        {{- if .Values.helloWorld.enabled }}
        - protocol: TCP
          port: {{ .Values.helloWorld.port }}
        {{- end }}
      {{- end }}
---
# Authentik Outpost Ingress (fuer Proxy-Provider Reverse-Proxy)
# Der Outpost im authentik-Namespace proxied Traffic zum Backend-Service
{{- if .Values.authentik.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-authentik-ingress
  namespace: {{ include "quarantine-wrapper.appNamespace" . }}
  labels:
    {{- include "quarantine-wrapper.appLabels" . | nindent 4 }}
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.authentik.namespace }}
      {{- if .Values.ingressPorts }}
      ports:
        {{- range .Values.ingressPorts }}
        - protocol: TCP
          port: {{ . }}
        {{- end }}
      {{- end }}
{{- end }}
{{- if .Values.egress.directEgressCIDRs }}
---
# Direkter HTTPS-Egress fuer Hosts die den Proxy umgehen muessen.
# Notwendig wenn SDKs (z.B. tunnel-agent/matrix-bot-sdk) nicht mit
# mitmproxy-CONNECT-Tunnels kompatibel sind.
# CIDRs konfigurierbar via egress.directEgressCIDRs in values.yaml.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-direct-egress
  namespace: {{ include "quarantine-wrapper.appNamespace" . }}
  labels:
    {{- include "quarantine-wrapper.appLabels" . | nindent 4 }}
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        {{- range .Values.egress.directEgressCIDRs }}
        - ipBlock:
            cidr: {{ . }}
        {{- end }}
      ports:
        - protocol: TCP
          port: 443
{{- end }}
