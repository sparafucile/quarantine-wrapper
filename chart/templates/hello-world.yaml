{{- if .Values.helloWorld.enabled }}
# ============================================================================
# Hello-World Debug-Pod (im App-Namespace)
# Standardmaessig AUS, per Values togglebar fuer Debugging
# ============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: hello-world-html
  namespace: {{ include "quarantine-wrapper.appNamespace" . }}
  labels:
    {{- include "quarantine-wrapper.appLabels" . | nindent 4 }}
data:
  index.html: |
    <!DOCTYPE html>
    <html lang="de">
    <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>{{ .Values.appName | title }} Quarantine</title>
      <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%231a1a2e'/><text x='3' y='24' font-size='20' fill='%2316213e' stroke='%230f3460' stroke-width='1'>HW</text></svg>">
      <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #1a1a2e; color: #eee; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: #16213e; border: 2px solid #0f3460; border-radius: 12px; padding: 2.5rem; max-width: 700px; text-align: center; box-shadow: 0 8px 32px rgba(0,0,0,0.3); }
        h1 { color: #e94560; margin-top: 0; font-size: 1.8rem; }
        .status { background: #0f3460; border-radius: 8px; padding: 1rem; margin: 1rem 0; }
        .badge { display: inline-block; background: #e94560; color: white; padding: 0.3rem 0.8rem; border-radius: 20px; font-size: 0.85rem; font-weight: 600; }
        .info { text-align: left; font-size: 0.9rem; line-height: 1.6; }
        .info dt { color: #e94560; font-weight: 600; }
        .info dd { margin-left: 0; margin-bottom: 0.5rem; color: #aaa; }
        code { background: #0a0a1a; padding: 0.2rem 0.5rem; border-radius: 4px; font-size: 0.85rem; }
        .ca-section { background: #0f3460; border-radius: 8px; padding: 1rem; margin: 1.5rem 0 0.5rem; text-align: left; }
        .ca-section h2 { color: #e94560; font-size: 1.1rem; margin: 0 0 0.5rem; }
        .ca-cert { background: #0a0a1a; padding: 0.8rem; border-radius: 6px; font-family: monospace; font-size: 0.7rem; white-space: pre-wrap; word-break: break-all; max-height: 200px; overflow-y: auto; color: #8f8; margin: 0.5rem 0; }
        .btn { display: inline-block; background: #e94560; color: white; padding: 0.5rem 1.2rem; border-radius: 6px; text-decoration: none; font-size: 0.85rem; font-weight: 600; margin-top: 0.5rem; }
        .btn:hover { background: #c73e55; }
      </style>
    </head>
    <body>
      <div class="card">
        <h1>{{ .Values.appName | title }} Quarantine</h1>
        <p><span class="badge">ISOLATED</span></p>
        <div class="status">
          <p>Dieser Pod laeuft im isolierten Quarantine-Namespace.</p>
          <p>Er kann <strong>nicht</strong> auf LAN-Ressourcen oder andere Namespaces zugreifen.</p>
        </div>
        <dl class="info">
          <dt>App</dt>
          <dd><code>{{ .Values.appName }}</code></dd>
          <dt>Version</dt>
          <dd><code>{{ .Chart.Version }}</code>{{ if and .Values.build.commit (ne .Values.build.commit "") }} @ <code>{{ .Values.build.commit }}</code>{{ end }}</dd>
          <dt>Deploy</dt>
          <dd><code>{{ now | date "2006-01-02 15:04 MST" }}</code></dd>
          <dt>Namespace</dt>
          <dd><code>{{ include "quarantine-wrapper.appNamespace" . }}</code></dd>
          <dt>Pod-Name</dt>
          <dd><code>__POD_NAME__</code></dd>
          <dt>Internet-Zugang</dt>
          {{- if .Values.mitmproxy.enabled }}
          <dd>Nur via Proxy (<code>mitmproxy.{{ include "quarantine-wrapper.gwNamespace" . }}:{{ .Values.mitmproxy.proxyPort }}</code> &rarr; squid &rarr; Internet)</dd>
          {{- else }}
          <dd>Nur via Proxy (<code>squid.{{ include "quarantine-wrapper.gwNamespace" . }}:{{ .Values.squid.port }}</code>)</dd>
          {{- end }}
          <dt>Pod-Kommunikation</dt>
          <dd>Nur innerhalb <code>{{ include "quarantine-wrapper.appNamespace" . }}</code></dd>
        </dl>
        {{- if and .Values.mitmproxy.enabled .Values.ca.enabled }}
        <div class="ca-section">
          <h2>mitmproxy CA-Zertifikat</h2>
          <p style="font-size:0.8rem;color:#aaa;">Fuer TLS-Interception im Quarantine-Netz.</p>
          <div class="ca-cert" id="ca-cert">Lade CA-Zertifikat...</div>
          <a class="btn" href="/ca.pem" download="mitmproxy-ca.pem">Download CA (PEM)</a>
        </div>
        <script>
          fetch('/ca.pem').then(r => r.text()).then(t => {
            if (t.startsWith('-----BEGIN')) {
              document.getElementById('ca-cert').textContent = t;
            } else {
              document.getElementById('ca-cert').textContent = 'CA-Zertifikat noch nicht verfuegbar.';
            }
          }).catch(() => {
            document.getElementById('ca-cert').textContent = 'CA-Zertifikat nicht erreichbar.';
          });
        </script>
        {{- end }}
      </div>
    </body>
    </html>
  nginx.conf: |
    server {
        listen {{ .Values.helloWorld.port }};
        server_name _;
        location / {
            root /usr/share/nginx/html;
            index index.html;
            sub_filter '__POD_NAME__' '$hostname';
            sub_filter_once off;
            sub_filter_types text/html;
        }
        {{- if and .Values.mitmproxy.enabled .Values.ca.enabled }}
        location /ca.pem {
            alias /etc/ssl/ca-cert/mitmproxy-ca-cert.pem;
            default_type application/x-pem-file;
            add_header Content-Disposition 'attachment; filename="mitmproxy-ca.pem"';
        }
        {{- end }}
        location /health {
            access_log off;
            return 200 "ok";
        }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-world
  namespace: {{ include "quarantine-wrapper.appNamespace" . }}
  labels:
    {{- include "quarantine-wrapper.appLabels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hello-world
  template:
    metadata:
      labels:
        app: hello-world
        app.kubernetes.io/part-of: {{ .Values.appName }}-quarantine
      annotations:
        checksum/config: {{ .Values | toJson | sha256sum | trunc 8 }}-{{ .Chart.Version }}
    spec:
      {{- if and .Values.mitmproxy.enabled .Values.ca.enabled }}
      initContainers:
        {{- include "quarantine-wrapper.caTrustInitContainer" . | nindent 8 }}
      {{- end }}
      containers:
        - name: nginx
          image: {{ .Values.helloWorld.image.repository }}:{{ .Values.helloWorld.image.tag }}
          ports:
            - containerPort: {{ .Values.helloWorld.port }}
              name: http
          {{- if and .Values.mitmproxy.enabled .Values.ca.enabled }}
          env:
            {{- include "quarantine-wrapper.proxyEnv" . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: html
              mountPath: /usr/share/nginx/html/index.html
              subPath: index.html
            - name: html
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: nginx.conf
            {{- if and .Values.mitmproxy.enabled .Values.ca.enabled }}
            {{- include "quarantine-wrapper.caTrustVolumeMounts" . | nindent 12 }}
            - name: mitmproxy-ca-cert
              mountPath: /etc/ssl/ca-cert
              readOnly: true
            {{- end }}
          resources:
            {{- toYaml .Values.helloWorld.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.helloWorld.port }}
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.helloWorld.port }}
            initialDelaySeconds: 3
            periodSeconds: 10
      volumes:
        - name: html
          configMap:
            name: hello-world-html
        {{- if and .Values.mitmproxy.enabled .Values.ca.enabled }}
        {{- include "quarantine-wrapper.caTrustVolumes" . | nindent 8 }}
        {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: hello-world
  namespace: {{ include "quarantine-wrapper.appNamespace" . }}
  labels:
    {{- include "quarantine-wrapper.appLabels" . | nindent 4 }}
    {{- if .Values.authentik.enabled }}
    quarantine.sparafucile.net/authentik: "true"
    {{- end }}
  {{- if .Values.authentik.enabled }}
  annotations:
    quarantine.sparafucile.net/external-host: "https://{{ include "quarantine-wrapper.helloWorldHostname" . }}"
    quarantine.sparafucile.net/skip-path-regex: ""
  {{- end }}
spec:
  selector:
    app: hello-world
  ports:
    - port: {{ .Values.helloWorld.port }}
      targetPort: {{ .Values.helloWorld.port }}
      name: http
---
# HTTPRoute fuer Hello-World
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .Values.appName }}-hello-world
  namespace: {{ include "quarantine-wrapper.appNamespace" . }}
  annotations:
    external-dns.alpha.kubernetes.io/hostname: {{ include "quarantine-wrapper.helloWorldHostname" . }}
  labels:
    {{- include "quarantine-wrapper.appLabels" . | nindent 4 }}
spec:
  parentRefs:
    - name: {{ .Values.gateway.name }}
      namespace: {{ .Values.gateway.namespace }}
      sectionName: {{ .Values.gateway.sectionName }}
  hostnames:
    - {{ include "quarantine-wrapper.helloWorldHostname" . }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - group: ""
          kind: Service
          name: hello-world
          port: {{ .Values.helloWorld.port }}
          weight: 1
{{- end }}
