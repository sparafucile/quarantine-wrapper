# ============================================================
# Quarantine-Wrapper Helm Values (v2)
# Generischer Wrapper fuer isolierte Quarantine-Umgebungen
# ============================================================

# ============================================================
# PFLICHT: App-Name (steuert alle dynamischen Namen)
# ============================================================
appName: "example"             # PFLICHT: In ArgoCD überschreiben! z.B. "showcase" -> showcase-quarantine + showcase-quarantine-gw

# ============================================================
# KYVERNO: Transparente Proxy/CA-Injection (v2)
# ============================================================
# Wenn aktiviert, wird eine ClusterPolicy erstellt die automatisch
# Proxy-Env-Vars, CA-Trust-initContainer und Volumes in alle Pods
# im App-Namespace injiziert. Apps brauchen sich nicht selbst
# um Proxy-Konfiguration zu kuemmern.
kyverno:
  enabled: true

# ============================================================
# INGRESS: Erlaubte Ports fuer App-Services (v2)
# ============================================================
# Liste der TCP-Ports die von Gateway/LAN/kube-system erreichbar sein sollen.
# Apps deployen ihre eigenen Services und HTTPRoutes — der Wrapper
# muss nur wissen welche Ports die Firewall oeffnen soll.
ingressPorts: []
  # Beispiel fuer OpenClaw:
  # - 18789

# ============================================================
# EGRESS: Konfigurierbar
# ============================================================
egress:
  # Standard: Internet nur via Proxy, LAN/Pod-CIDR/Service-CIDR blockiert
  squidAllowedDomains:           # Domain-Whitelist fuer Squid
    - placeholder.quarantine.internal   # Dummy: blockiert ALLES bis echte Domains eingetragen werden
  # WICHTIG: Leere Liste ([]) wuerde ALLES erlauben!
  # Eintraege OHNE fuehrenden Punkt - der Punkt wird automatisch ergaenzt.
  # Beispiel:
  # squidAllowedDomains:
  #   - generativelanguage.googleapis.com   # Google Gemini API
  #   - api.openai.com                      # OpenAI API
  #   - registry.npmjs.org                  # npm Registry
  extraEgressRules: []         # Zusaetzliche K8s NetworkPolicy egress rules

# ============================================================
# PROXY: Squid
# ============================================================
squid:
  image:
    repository: ubuntu/squid
    tag: latest
  port: 3128
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "1Gi"
      cpu: "500m"

# ============================================================
# PROXY: mitmproxy (Debug-Proxy mit TLS-Interception)
# ============================================================
mitmproxy:
  enabled: true
  image:
    repository: mitmproxy/mitmproxy
    tag: latest
  proxyPort: 8080
  webPort: 8081
  hostname: ""                 # Default: p-<appName>-mitmweb-k8s.sparafucile.net
  openbaoPath: ""              # Default: apps/<appName>-quarantine/mitmweb-password
  storageClass: longhorn
  storageSize: 100Mi
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "2Gi"
      cpu: "1000m"
  authentik:
    enabled: true              # mitmweb hinter Authentik

# ============================================================
# CA-ZERTIFIKAT (mitmproxy TLS-Interception)
# ============================================================
ca:
  enabled: true
  openbaoPath: ""              # Default: apps/<appName>-quarantine/mitmproxy-ca
  secretName: mitmproxy-ca     # Name des K8s Secret im gw-Namespace
  distributorImage:
    repository: python
    tag: "3.12-slim"
  initImage:
    repository: alpine
    tag: "3.21"

# ============================================================
# HELLO-WORLD DEBUG-POD (standardmaessig AUS)
# ============================================================
helloWorld:
  enabled: false
  image:
    repository: nginx
    tag: "1.27-alpine"
  port: 8080
  hostname: ""                 # Default: p-<appName>-hello-k8s.sparafucile.net
  resources:
    requests:
      memory: "32Mi"
      cpu: "10m"
    limits:
      memory: "64Mi"
      cpu: "100m"

# ============================================================
# NETZWERK (Cluster-spezifisch, selten zu aendern)
# ============================================================
network:
  lanCIDR: "192.168.4.0/24"
  podCIDR: "10.244.0.0/16"
  serviceCIDR: "10.32.0.0/12"
  coreDNSClusterIP: "10.32.0.10"

# ============================================================
# GATEWAY (Cilium Gateway API)
# ============================================================
gateway:
  name: cluster-gateway
  namespace: gateway-system
  sectionName: https-wildcard
  domain: sparafucile.net

# ============================================================
# AUTHENTIK SSO
# ============================================================
authentik:
  enabled: true
  namespace: authentik
  # API-Credentials fuer automatische Provider-Erstellung (Phase 5)
  apiTokenSecret: ""           # K8s Secret mit Authentik API-Token (Default: authentik-api-token)
  openbaoPath: ""              # Default: infra/authentik/api-token (shared)
  outpostPk: 1                 # Primary Key des Embedded Outpost
  # v2: Externe Apps die im Quarantine-Namespace deployt werden
  # Der Wrapper erstellt Authentik Proxy Provider + Application fuer jede App.
  # Apps deployen ihre eigenen Services/HTTPRoutes — hier wird nur die
  # Authentik-Registrierung konfiguriert.
  externalApps: []
    # Beispiel:
    # - name: openclaw                               # Provider-Name (wird zu <appName>-<name>)
    #   hostname: p-openclaw-k8s.sparafucile.net      # Externer Hostname
    #   service: openclaw                             # K8s Service-Name im App-Namespace
    #   port: 18789                                   # Service-Port
    #   skipPathRegex: ""                             # API-Bypass Regex (optional)

# ============================================================
# CILIUM
# ============================================================
cilium:
  l7Visibility: true

# ============================================================
# RBAC (Quarantine-Workloads)
# ============================================================
rbac:
  enabled: true

# ============================================================
# BUILD (Jenkins Pipeline)
# ============================================================
build:
  number: "172"
  commit: "23ac0d3"
  date: "2026-03-19 10:42 UTC"

# ============================================================
# CONTROLCENTER
# ============================================================
controlcenter:
  enabled: false
  image:
    repository: p-harbor-core-k8s.sparafucile.net/library/quarantine-controlcenter
    tag: "1.0.12@sha256:ffbe761fecbd28a2a9dc9b609287a2326176f096502f23f7a1964ff182623a04"
  port: 8080
  hostname: ""              # Default: p-<appName>-quarantine-cc-k8s.<domain>
  resources:
    requests:
      memory: "64Mi"
      cpu: "50m"
    limits:
      memory: "256Mi"
      cpu: "500m"
